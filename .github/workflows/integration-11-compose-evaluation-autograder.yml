name: integration-11-compose-evaluation Autograder

on:
  push:
    branches:
      - integration-11-compose-evaluation
  pull_request:
    branches:
      - main

jobs:
  autograder:
    runs-on: ubuntu-latest

    # No service containers. The pre-built backend (api/main.py) is
    # deterministic and fixture-driven -- it serves gold values from
    # data/{ner_conll30,kg_questions,rag_questions}.json without ever
    # connecting to Neo4j or Weaviate. CI brings up the API directly via
    # uvicorn, runs eval_runner.py against it to regenerate
    # reports/evaluation-report.md, then asserts on the report. Adding
    # neo4j + weaviate containers here added ~45 s of cold-start time per
    # run for no verification gain. Learners still bring up the full
    # M10/M11 topology via docker-compose.yml locally (it's part of what
    # they're learning); CI just exercises the part this assignment is
    # actually grading.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Start pre-built Integration API
        run: |
          nohup python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 \
            > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API /readyz
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/readyz >/dev/null 2>&1; then
              echo "API ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready in 60s; api.log:"
          cat api.log || true
          exit 1

      - name: Regenerate evaluation report against the running backend
        env:
          API_URL: http://localhost:8000
        run: |
          mkdir -p reports
          python eval_runner.py --output reports/evaluation-report.md

      - name: Run autograder tests
        env:
          API_URL: http://localhost:8000
        run: |
          pytest tests/ -v --tb=short

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then kill "$(cat api.pid)" || true; fi
